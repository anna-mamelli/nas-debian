<VirtualHost *:443>
  ServerName nas.local
  DocumentRoot /srv/nas/webdav
  SSLEngine on
  SSLCertificateFile /etc/ssl/certs/nas-selfsigned.crt
  SSLCertificateKeyFile /etc/ssl/private/nas-selfsigned.key
  <Directory /srv/nas/webdav>
    Dav On
    Options Indexes
    AuthType Digest
    AuthName "NAS WebDAV"
    AuthDigestProvider file
    AuthUserFile /etc/apache2/webdav.users
    Require valid-user
  </Directory>
  DavLockDB /var/lock/apache2/DavLock
</VirtualHost>
